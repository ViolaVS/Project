name: CI

# Run on every push to any branch.
on:
  push:
    branches:
      - "**"

jobs:
  # ---------------------------------------------------------------------------
  # Code check.
  # NOTE: neither project has ESLint (or any other linter) configured, so there
  # is no `lint` script to run. The closest "check the code" step the repo
  # actually supports is the TypeScript compiler (what CLAUDE.md treats as
  # verification). Once a linter is added, add an `npm run lint` step here.
  # ---------------------------------------------------------------------------
  check:
    name: Type-check (backend + frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # --- Backend ---
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npm run prisma:generate

      - name: Type-check backend
        working-directory: backend
        run: npx tsc --noEmit

      # --- Frontend ---
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check & build frontend
        working-directory: frontend
        run: npm run build

  # ---------------------------------------------------------------------------
  # Tests.
  # The only tests in the repo are the frontend Playwright e2e suite
  # (frontend/e2e). They exercise the real app, so CI must spin up the backend
  # API on :4000 backed by a freshly created + seeded SQLite database. The
  # frontend dev server (:5173) is started automatically by Playwright's
  # webServer config.
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./dev.db"
      JWT_SECRET: "ci-test-secret"
      PORT: "4000"
      CLIENT_ORIGIN: "http://localhost:5173"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # --- Backend: install, create + seed the database, start the API ---
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client and create database schema
        working-directory: backend
        run: |
          npm run prisma:generate
          npm run prisma:push

      - name: Seed demo data
        working-directory: backend
        run: npm run seed

      - name: Start backend API and wait until it is ready
        working-directory: backend
        run: |
          npm run dev &
          timeout 60 bash -c 'until echo > /dev/tcp/127.0.0.1/4000; do sleep 1; done'
          echo "Backend is listening on :4000"

      # --- Frontend: install, browsers, run tests (Playwright boots Vite) ---
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e tests
        working-directory: frontend
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
